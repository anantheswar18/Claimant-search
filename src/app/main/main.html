<form [formGroup]="searchForm" class="search-form-container">
    <div class="form-group">
        <label>Claim Number:</label>
        <input type="text" formControlName="claimNumber">
    </div>
    <div class="form-group">
        <label>Examiner:</label>
        <input type="text" placeholder="Search" formControlName="examiner">
    </div>
    <div class="form-group">
        <label>Insurance Type:</label>
        <select formControlName="insuranceType">
            <option value="">Select</option>
            @for (type of insuranceTypes(); track type.insuranceType) {
                <option [value]="type.insuranceType">{{ type.insuranceTypeDesc }}</option>
            }
        </select>
    </div>
    <div class="form-group">
        <label>Email Id:</label>
        <input type="email" formControlName="emailId">
    </div>

    <!-- Date Range -->
    <div class="form-group">
        <label>From Incident Date:</label>
        <input type="date" formControlName="dolStart">
    </div>
    <div class="form-group">
        <label>To Incident Date:</label>
        <input type="date" formControlName="dolEnd">
    </div>

    <!-- Employer Typeahead -->
    <div class="form-group position-relative">
        <label>Employer:</label>
        <div class="input-wrapper">
            <input type="text" placeholder="Search" formControlName="employer">
            @if (showEmployerDropdown()) {
                <div class="typeahead-dropdown">
                    @for (emp of employerResults(); track emp.insured_id) {
                        <div class="typeahead-item" (click)="selectEmployer(emp)">
                            {{ emp.insured }}
                        </div>
                    }
                </div>
            }
        </div>
    </div>

    <div class="form-group">
        <label>Organizer2:</label>
        <select formControlName="organizer2">
            <option value="">Search</option>
        </select>
    </div>
    <div class="form-group">
        <label>Phone Number:</label>
        <input type="text" placeholder="Search" formControlName="phoneNumber">
    </div>
    <div class="form-group">
        <label>Quick Search:</label>
        <select formControlName="quickSearch">
            <option value="">Search</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>SSN:</label>
        <input type="text" placeholder="xxx-xx-xxxx" formControlName="ssn">
    </div>
    
    <!-- Status -->
    <div class="form-group">
        <label>Status:</label>
        <select formControlName="status">
            <option value="">Select</option>
            @for (s of statuses(); track s.statusCode) {
                <option [value]="s.statusCode">{{ s.statusDesc }}</option>
            }
        </select>
    </div>

    <div class="form-group">
        <label>Program:</label>
        <input type="text" placeholder="Search" formControlName="program">
    </div>
    <div class="form-group">
        <label>Jurisdiction Claim Number:</label>
        <input type="text" placeholder="Search" formControlName="jurisdictionClaimNumber">
    </div>
    <div class="form-group">
        <label>DOB:</label>
        <input type="date" formControlName="dob">
    </div>

    <!-- Claimant Names -->
    <div class="form-group">
        <label>Claimant First Name:</label>
        <input type="text" placeholder="First Name" formControlName="claimantFirstName">
    </div>
    <div class="form-group">
        <label>Claimant Last Name:</label>
        <input type="text" placeholder="Last Name" formControlName="claimantLastName">
    </div>

    <div class="form-group">
        <label>Employee Number:</label>
        <input type="text" placeholder="Search" formControlName="employeeNumber">
    </div>
    <div class="form-group">
        <label>Affiliate Claim Number:</label>
        <input type="text" placeholder="Search" formControlName="afiliateClaimNumber">
    </div>
    <div class="form-group">
        <label>Claimant Type:</label>
        <select formControlName="claimantType">
            <option value="">Select</option>
        </select>
    </div>

    <!-- Underwriter Typeahead -->
    <div class="form-group position-relative">
        <label>Underwriter:</label>
        <div class="input-wrapper">
            <input type="text" placeholder="Search Underwriter" formControlName="underwriter">
            @if (showUnderwriterDropdown()) {
                <div class="typeahead-dropdown">
                    @for (uw of underwriterResults(); track uw.underwriter_id) {
                        <div class="typeahead-item" (click)="selectUnderwriter(uw)">
                            {{ uw.underwriter_name }}
                        </div>
                    }
                </div>
            }
        </div>
    </div>
    
    <div class="form-group">
        <label>Adjusting Office:</label>
        <select formControlName="adjustingOffice">
            <option value="">Search</option>
        </select>
    </div>
</form>
